<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ผลสอบ</title>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      text-align: center;
      padding: 2em;
      background: #f7f7f7;
    }

    /* ส่วนแสดง userId เพื่อตรวจสอบ */
    #debugBox {
      background: #e9ecef;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px dashed #6c757d;
      font-size: 0.9em;
      word-break: break-all;
    }

    #spinner {
      margin: 2em auto;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #userInfo {
      color: #007bff;
      font-size: 1.2em;
      margin-top: 1em;
    }

    #resultTable {
      margin: 2em auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 500px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #resultTable th, #resultTable td {
      border: 1px solid #ddd;
      padding: 12px;
    }

    #resultTable th {
      background-color: #007bff;
      color: white;
    }

    #totalScore {
      font-weight: bold;
    }

    #rankDisplay {
      font-size: 2.5em;
      font-weight: bold;
      color: #dc3545;
      margin-top: 1em;
    }

    img {
      margin-top: 1em;
      max-width: 150px;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h2>ผลสอบเลื่อนฐานะนายทหารประทวน 2568</h2>

  <!-- ส่วนแสดงค่า userId สำหรับ Debug -->
  <div id="debugBox">
    <strong>กำลังตรวจสอบสิทธิ์สำหรับ ID:</strong> <br>
    <span id="displayUserId">กำลังโหลด...</span>
  </div>

  <!-- Spinner Loading -->
  <div id="spinner"></div>

  <!-- Result area -->
  <div id="resultArea" style="display:none;"></div>

  <script>
    function formatThaiDate(dateString) {
      if(!dateString) return "-";
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543; // ปรับเป็น พ.ศ.
      return `${day}/${month}/${year}`;
    }

    const sheetApi = "https://script.google.com/macros/s/AKfycbwC0-ZzkeYj3gUYhde2qyRyZxEgxUxnOXTCuziir6XMk8LcHKtOW8obbL-jO2cAu2Kbxw/exec";

    async function main() {
      try {
        await liff.init({ liffId: "2006679138-PWgbBdk3" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const userId = profile.userId;
        
        // แสดง userId ขึ้นมาก่อนทันทีที่โหลดสำเร็จ
        document.getElementById("displayUserId").innerText = userId;

        // เรียกข้อมูลจาก Google Sheets
        const res = await fetch(sheetApi + "?userId=" + userId);
        const data = await res.json();

        document.getElementById("spinner").style.display = "none";
        const area = document.getElementById("resultArea");
        area.style.display = "block";

        if (data.error) {
          area.innerHTML = `<div style="color:red; padding:20px; background:#fff; border-radius:8px;">
                              <h3>ไม่พบข้อมูล</h3>
                              <p>${data.error}</p>
                              <small>โปรดตรวจสอบว่าท่านได้ลงทะเบียนด้วย ID นี้แล้วหรือไม่</small>
                            </div>`;
        } else {
          const totalFixed = parseFloat(data.total).toFixed(2);

          area.innerHTML = `
            <img src="${data.image || 'https://via.placeholder.com/150'}" alt="รูปภาพผู้ใช้">
            <div id="userInfo">
              <p><strong>ชื่อ - สกุล:</strong> ${data.name}</p>
            </div>

            <table id="resultTable">
              <thead>
                <tr>
                  <th>วิชาสอบ</th>
                  <th>คะแนน</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>บัญชี</td><td>${data.account || 0}</td></tr>
                <tr><td>คอมพิวเตอร์</td><td>${data.computer || 0}</td></tr>
                <tr><td>ค่าใช้จ่าย</td><td>${data.cost || 0}</td></tr>
                <tr><td>ภาษาอังกฤษ</td><td>${data.english || 0}</td></tr>
                <tr><td>คะแนนเพิ่ม</td><td>${data.bonus || 0}</td></tr>
                <tr id="totalScore" style="background:#f8f9fa;">
                  <td><strong>คะแนนรวม</strong></td>
                  <td style="color:#007bff;"><strong>${totalFixed}</strong></td>
                </tr>
              </tbody>
            </table>

            <p><strong>วันที่ประกาศผล:</strong> ${formatThaiDate(data.datetest)}</p>
            <div id="rankDisplay">ลำดับที่ ${data.rank}</div>
          `;
        }
      } catch (err) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("displayUserId").innerText = "Error: " + err.message;
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
