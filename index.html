<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ประกาศผลสอบ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      text-align: center;
      padding: 1.5em;
      background: #f7f7f7;
    }

    #userIdStatusBox {
      background: #e3faf2;
      color: #0ca678;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #96f2d7;
      font-size: 0.9em;
      word-break: break-all;
    }

    /* กล่องควบคุมการเลือกปี พ.ศ. */
    .filter-container {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      margin: 15px auto;
      max-width: 500px;
      width: 90%;
    }

    .filter-container label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      color: #333;
    }

    .filter-container select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 100%;
      font-size: 1em;
      font-family: 'Sarabun', sans-serif;
    }

    #spinner {
      margin: 2em auto;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); } /* แก้จาก 3600deg เป็น 360deg */
    }

    #userInfo {
      color: #007bff;
      font-size: 1.2em;
      margin-top: 1em;
    }

    #resultTable {
      margin: 1.5em auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 500px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #resultTable th, #resultTable td {
      border: 1px solid #ddd;
      padding: 12px;
    }

    #resultTable th {
      background-color: #007bff;
      color: white;
    }

    #totalScore {
      font-weight: bold;
    }

    #rankDisplay {
      font-size: 2.3em;
      font-weight: bold;
      color: #dc3545;
      margin-top: 1em;
    }

    img {
      margin-top: 1em;
      max-width: 130px;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    
    /* รูปภาพแสดงความยินดี */
    .congrats-image {
      margin-top: 1.5em;
      max-width: 250px;
      width: 90%;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    
    .error-card {
      background: #fff5f5;
      color: #c92a2a;
      border: 1px solid #ffc9c9;
      padding: 20px;
      border-radius: 8px;
      margin: 15px auto;
      max-width: 500px;
      width: 90%;
    }
  </style>
</head>
<body>

  <h2>ผลสอบเลื่อนฐานะนายทหารประทวน</h2>

  <div id="userIdStatusBox">
    <strong>สถานะ LINE LIFF:</strong> <span id="liffStatus">กำลังเริ่มต้นระบบ...</span>
    <div id="userIdDisplayArea" style="display:none; margin-top: 5px;">
      <strong>Your User ID:</strong> <code id="myUserId" style="font-weight:bold; color:#007bff;"></code>
    </div>
  </div>

  <div class="filter-container">
    <label for="selectYear">🗓️ เลือกปี พ.ศ. ที่ต้องการตรวจสอบประวัติ:</label>
    <select id="selectYear" onchange="fetchExamResult()">
      <option value="2569" selected>ประจำปี พ.ศ. 2569 (ปีปัจจุบัน)</option>
      <option value="2568">ประจำปี พ.ศ. 2568</option>
    </select>
  </div>

  <div id="spinner" style="display:none;"></div>

  <div id="resultArea" style="display:none;"></div>

  <script>
    let globalUserId = ""; // เก็บค่า userId ไว้เรียกใช้ซ้ำเมื่อสลับปี
    const sheetApi = "https://script.google.com/macros/s/AKfycbwC0-ZzkeYj3gUYhde2qyRyZxEgxUxnOXTCuziir6XMk8LcHKtOW8obbL-jO2cAu2Kbxw/exec";
    const congratsImageSrc = "https://lh3.googleusercontent.com/d/1RXFiBNPhGow6GfoOxxkqM43sk42_6Bxg"; // ใส่ URL ของรูปภาพแสดงความยินดีที่คุณต้องการที่นี่
    
    function formatThaiDate(dateString) {
      if(!dateString) return "-";
      const date = new Date(dateString);
      if(isNaN(date.getTime())) return dateString; // ป้องกันถ้าระบบส่งเป็นข้อความตรงๆ มา
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543; 
      return `${day}/${month}/${year}`;
    }

    // ฟังก์ชันเริ่มต้น LIFF และดึงข้อมูลประวัติผู้ใช้
    async function main() {
      try {
        await liff.init({ liffId: "2006679138-PWgbBdk3" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        globalUserId = profile.userId;

        document.getElementById("liffStatus").innerText = "เชื่อมต่อบริการ LINE สำเร็จ";
        document.getElementById("myUserId").innerText = globalUserId;
        document.getElementById("userIdDisplayArea").style.display = "block";

        // เมื่อได้ไอดีแล้ว สั่งดึงคะแนนของปีเริ่มต้น (2569) ทันที
        fetchExamResult();

      } catch (liffError) {
        document.getElementById("userIdStatusBox").style.background = "#fff5f5";
        document.getElementById("userIdStatusBox").style.borderColor = "#ffc9c9";
        document.getElementById("liffStatus").style.color = "#c92a2a";
        document.getElementById("liffStatus").innerText = "เกิดข้อผิดพลาดรหัส LINE: " + liffError.message;
      }
    }

    // ฟังก์ชันดึงข้อมูลคะแนนตามปีที่เลือกจากชีต
    async function fetchExamResult() {
      if (!globalUserId) return;

      // แสดง Spinner และซ่อนพื้นที่ผลลัพธ์เก่าก่อนโหลดข้อมูลใหม่
      document.getElementById("spinner").style.display = "block";
      document.getElementById("resultArea").style.display = "none";

      const selectedYear = document.getElementById("selectYear").value;

      try {
        const res = await fetch(`${sheetApi}?userId=${globalUserId}&year=${selectedYear}`);
        
        if (!res.ok) {
          throw new Error(`HTTP Status: ${res.status}`);
        }
        
        const data = await res.json();
        document.getElementById("spinner").style.display = "none";
        const area = document.getElementById("resultArea");
        area.style.display = "block";

        if (data.error) {
          area.innerHTML = `
            <div class="error-card">
              <h3>แจ้งเตือนจากระบบ</h3>
              <p>${data.error}</p>
            </div>`;
        } else {
          const totalFixed = parseFloat(data.total).toFixed(2);

          let congratsHtml = "";
          // ตรวจสอบสถานะแสดงความยินดีจากคอลัมน์ M
          if (data.congratsStatus == "1") {
            congratsHtml = `<img src="${congratsImageSrc}" alt="ขอแสดงความยินดีด้วยครับ" class="congrats-image">`;
          }
          
          area.innerHTML = `
            <img src="${data.image || 'https://via.placeholder.com/130'}" alt="รูปภาพผู้ใช้">
            <div id="userInfo">
              <p><strong>ชื่อ - สกุล:</strong> ${data.name}</p>
              <p style="font-size:0.9em; color:#6c757d;">ประวัติการสอบประจำปี พ.ศ. ${data.year}</p>
            </div>

            <table id="resultTable">
              <thead>
                <tr>
                  <th>วิชาสอบ</th>
                  <th>คะแนนที่ได้</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>บัญชี</td><td>${data.account || 0}</td></tr>
                <tr><td>คอมพิวเตอร์</td><td>${data.computer || 0}</td></tr>
                <tr><td>ค่าใช้จ่าย</td><td>${data.cost || 0}</td></tr>
                <tr><td>ภาษาอังกฤษ</td><td>${data.english || 0}</td></tr>
                <tr><td>คะแนนเพิ่ม</td><td>${data.bonus || 0}</td></tr>
                <tr id="totalScore" style="background:#f8f9fa;">
                  <td><strong>คะแนนรวม</strong></td>
                  <td style="color:#007bff;"><strong>${totalFixed}</strong></td>
                </tr>
              </tbody>
            </table>

            <p><strong>วันที่ประกาศผล:</strong> ${formatThaiDate(data.datetest)}</p>
            <div id="rankDisplay">ลำดับที่ ${data.rank}</div>
            <div id="congrats">สถานะแสดงความยินดี ${data.congratsStatus}</div>
          `;
        }

      } catch (fetchError) {
        document.getElementById("spinner").style.display = "none";
        const area = document.getElementById("resultArea");
        area.style.display = "block";
        
        area.innerHTML = `
          <div class="error-card">
            <h3>ดึงข้อมูลไม่สำเร็จ (Failed to fetch)</h3>
            <p>ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ตหรือระบบฝั่งเซิร์ฟเวอร์</p>
            <small style="color:#868e96;">Error message: ${fetchError.message}</small>
          </div>`;
      }
    }

    // เริ่มทำงานระบบหลักเมื่อเปิดหน้าเว็บ
    main();
  </script>
</body>
</html>
