<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ผลสอบ</title>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      text-align: center;
      padding: 2em;
      background: #f7f7f7;
    }

    /* กล่องโชว์สถานะการดึง userId */
    #userIdStatusBox {
      background: #e3faf2;
      color: #0ca678;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #96f2d7;
      font-size: 1em;
      word-break: break-all;
    }

    #spinner {
      margin: 2em auto;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #userInfo {
      color: #007bff;
      font-size: 1.2em;
      margin-top: 1em;
    }

    #resultTable {
      margin: 2em auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 500px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #resultTable th, #resultTable td {
      border: 1px solid #ddd;
      padding: 12px;
    }

    #resultTable th {
      background-color: #007bff;
      color: white;
    }

    #totalScore {
      font-weight: bold;
    }

    #rankDisplay {
      font-size: 2.5em;
      font-weight: bold;
      color: #dc3545;
      margin-top: 1em;
    }

    img {
      margin-top: 1em;
      max-width: 150px;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    /* กล่องแจ้งเตือนความผิดพลาด */
    .error-card {
      background: #fff5f5;
      color: #c92a2a;
      border: 1px solid #ffc9c9;
      padding: 20px;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <h2>ผลสอบเลื่อนฐานะนายทหารประทวน</h2>

  <!-- ส่วนนี้จะทำงานและแสดงผลก่อนเสมอ เพื่อยืนยันว่าเรียก userId ได้จริง -->
  <div id="userIdStatusBox">
    <strong>สถานะ LINE LIFF:</strong> <span id="liffStatus">กำลังเริ่มต้นระบบ...</span><br>
    <div id="userIdDisplayArea" style="display:none; margin-top: 5px;">
      <strong>Your User ID:</strong> <code id="myUserId" style="font-weight:bold; color:#007bff;"></code>
    </div>
  </div>

  <!-- Spinner Loading สำหรับช่วงที่ไปดึงข้อมูลจาก Sheet -->
  <div id="spinner"></div>

  <!-- Result area -->
  <div id="resultArea" style="display:none;"></div>

  <script>
    function formatThaiDate(dateString) {
      if(!dateString) return "-";
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear() + 543; 
      return `${day}/${month}/${year}`;
    }

    const sheetApi = "https://script.google.com/macros/s/AKfycbwC0-ZzkeYj3gUYhde2qyRyZxEgxUxnOXTCuziir6XMk8LcHKtOW8obbL-jO2cAu2Kbxw/exec";

    async function main() {
      let userId = "";

      // --- ขั้นตอนที่ 1: ดึงและแสดงผล User ID จาก LINE ---
      try {
        await liff.init({ liffId: "2006679138-PWgbBdk3" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;

        // ดึงสำเร็จ! สั่งโชว์บนหน้าจอทันที ไม่รอขั้นตอนถัดไป
        document.getElementById("liffStatus").innerText = "ดึงข้อมูลสำเร็จ นำไปค้นหาต่อ...";
        document.getElementById("myUserId").innerText = userId;
        document.getElementById("userIdDisplayArea").style.display = "block";

      } catch (liffError) {
        // หากระบบพังตั้งแต่ดึงจาก LINE
        document.getElementById("userIdStatusBox").style.background = "#fff5f5";
        document.getElementById("userIdStatusBox").style.borderColor = "#ffc9c9";
        document.getElementById("liffStatus").style.color = "#c92a2a";
        document.getElementById("liffStatus").innerText = "เกิดข้อผิดพลาดในการดึงรหัสจาก LINE: " + liffError.message;
        document.getElementById("spinner").style.display = "none";
        return; // หยุดการทำงาน
      }

      // --- ขั้นตอนที่ 2: วิ่งไปดึงข้อมูลจาก Google Sheets ---
      try {
        const res = await fetch(sheetApi + "?userId=" + userId);
        
        // ตรวจสอบว่า HTTP status เป็น 200 หรือไม่
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        
        const data = await res.json();

        // ปิดตัวโหลดข้อมูล
        document.getElementById("spinner").style.display = "none";
        const area = document.getElementById("resultArea");
        area.style.display = "block";

        if (data.error) {
          area.innerHTML = `
            <div class="error-card">
              <h3>เชื่อมต่อชีตสำเร็จ แต่ไม่พบชื่อ</h3>
              <p>${data.error}</p>
            </div>`;
        } else {
          const totalFixed = parseFloat(data.total).toFixed(2);

          area.innerHTML = `
            <img src="${data.image || 'https://via.placeholder.com/150'}" alt="รูปภาพผู้ใช้">
            <div id="userInfo">
              <p><strong>ชื่อ - สกุล:</strong> ${data.name}</p>
            </div>

            <table id="resultTable">
              <thead>
                <tr>
                  <th>วิชาสอบ</th>
                  <th>คะแนน</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>บัญชี</td><td>${data.account || 0}</td></tr>
                <tr><td>คอมพิวเตอร์</td><td>${data.computer || 0}</td></tr>
                <tr><td>ค่าใช้จ่าย</td><td>${data.cost || 0}</td></tr>
                <tr><td>ภาษาอังกฤษ</td><td>${data.english || 0}</td></tr>
                <tr><td>คะแนนเพิ่ม</td><td>${data.bonus || 0}</td></tr>
                <tr id="totalScore" style="background:#f8f9fa;">
                  <td><strong>คะแนนรวม</strong></td>
                  <td style="color:#007bff;"><strong>${totalFixed}</strong></td>
                </tr>
              </tbody>
            </table>

            <p><strong>วันที่ประกาศผล:</strong> ${formatThaiDate(data.datetest)}</p>
            <div id="rankDisplay">ลำดับที่ ${data.rank}</div>
          `;
        }

      } catch (fetchError) {
        // หากขั้นตอนนี้พังด้วยอาการ Failed to fetch หรือ URL ผิดพลาด กล่องไอดีด้านบนจะยังคงค้างอยู่เหมือนเดิม
        document.getElementById("spinner").style.display = "none";
        const area = document.getElementById("resultArea");
        area.style.display = "block";
        
        area.innerHTML = `
          <div class="error-card">
            <h3>ดึงข้อมูลไม่สำเร็จ (Failed to fetch)</h3>
            <p>ไม่สามารถเชื่อมต่อไปยังระบบฐานข้อมูล Google Sheets ได้</p>
            <small style="color:#868e96;">คำอธิบายข้อผิดพลาด: ${fetchError.message}</small>
            <br><br>
            <p style="text-align:left; font-size:0.85em; background:#f1f3f5; padding:10px; border-radius:4px; color:#495057;">
              <strong>คำแนะนำ:</strong> รหัสไอดีของคุณด้านบนอ่านค่าได้ปกติ ปัญหานี้มักจะเกิดจากเว็บแอปฝั่ง Google Script ยังไม่ได้อัปเดตเวอร์ชันใหม่หลังจากแก้โค้ด หรือไม่ได้ตั้งค่าสิทธิ์ให้เป็น "Anyone" (ทุกคน) ครับ
            </p>
          </div>`;
      }
    }

    main();
  </script>
</body>
</html>
